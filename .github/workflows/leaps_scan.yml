name: LEAPS Daily Scanner

on:
  schedule:
    # 22:00 UTC = 4:00 PM CST (UTC-6) on weekdays
    # During CDT (summer, UTC-5) this fires at 5 PM CDT — still after market close
    - cron: '0 22 * * 1-5'
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy requests

      - name: Run LEAPS scanner (scan only — no backtest)
        env:
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO:          avin.khurana18@gmail.com
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --scan-only

      - name: Upload HTML scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leaps-scan-${{ github.run_id }}
          path: leaps_scan.html
          retention-days: 30
